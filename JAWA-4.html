<!DOCTYPE html>
<html>
    <head>
        <title>Weather</title>
        <script src="script/JAWA-4.js"></script>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
        <link rel="stylesheet" href="css/style.css">
        <!-- <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.3/css/all.css" integrity="sha384-SZXxX4whJ79/gErwcOYf+zWLeJdY/qpuqC4cAa9rOGUstPomtqpuNWT9wdPEn2fk" crossorigin="anonymous"> -->
        <script src="https://kit.fontawesome.com/9e57bbf2ab.js" crossorigin="anonymous"></script>
    </head>
    <body>
        
        <div class="container">
            <div class="header">
                <div class="logo"><img src="img/jawa2.png" alt="JAWA-Logo" class="jawa-logo"></div>
                <div class="title">
                    <h1>Weather Forecast</h1>
                    <p class="presentation">Write the city name in the search box to get the weather forecast</p>
                </div>
                
            </div>
            <!-- <h1>Weather Forecast</h1>
            <h2>Current Weather</h2> -->
            <!-- Search box -->
            <div class="search-box">
                <input type="text" placeholder="Enter city name">
                <button onclick="getWeather()">Search</button>
            </div>
            <div class="today-weather-container">
                <div id="today" class="card">
                    <h1>Today</h1>
                    <p>Temperature: 25°C</p>
                    <p>Humidity: 60%</p>
                    <p>Wind Speed: 10 km/h</p>
                    <p><img src="#" alt="Weather Icon" class="weather-icon" id="weather-icon"></p>
                </div>
            </div>
            <div class="forecast-container">
                <div id="tomorrow" class="card">
                    <h1>Tomorrow</h1>
                    <p>Temperature: 28°C</p>
                    <p>Humidity: 55%</p>
                    <p>Wind Speed: 12 km/h</p>
                </div>
                <div id="day-after-tomorrow" class="card">
                    <h1>Day after tomorrow</h1>
                    <p>Temperature: 30°C</p>
                    <p>Humidity: 50%</p>
                    <p>Wind Speed: 15 km/h</p>
                </div>
            </div>
        </div>
    </body>
</html>
